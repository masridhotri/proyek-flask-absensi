<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-2xl shadow w-full max-w-sm">
    
    <h2 class="text-2xl font-bold text-center mb-6">Admin Login</h2>

    <form method="POST" action="/login" class="space-y-4">

        <div>
            <label class="text-sm text-gray-600">Username</label>
            <input type="text" name="username" required
                class="w-full mt-1 px-3 py-2 border rounded-lg focus:ring-2 focus:ring-purple-400 outline-none">
        </div>

        <div>
            <label class="text-sm text-gray-600">Password</label>
            <input type="password" name="password" required
                class="w-full mt-1 px-3 py-2 border rounded-lg focus:ring-2 focus:ring-purple-400 outline-none">
        </div>

        <button type="submit"
            class="w-full bg-purple-600 text-white py-2 rounded-lg hover:bg-purple-700 transition">
            Login
        </button>

    </form>

    {% if error %}
    <p class="text-red-500 text-sm mt-3 text-center">{{ error }}</p>
    {% endif %}

</div>

</body>
</html>
