        </div>

    </div>
</div>
</div>

<script>
    /* =========================
       STATE
    ========================= */
    const state = {
        data: Array.from({ length: 30 }, (_, i) => ({
            id: i + 1,
            nama: 'User ' + (i + 1),
            waktu: Math.floor(Math.random() * 24) + ':00',
            status: ['Hadir', 'Telat'][Math.floor(Math.random() * 2)]
        })),
        filtered: [],
        currentPage: 1,
        rowsPerPage: 10
    };

    /* =========================
       ELEMENTS
    ========================= */
    const el = {
        tableBody: document.getElementById('tableBody'),
        pagination: document.getElementById('pagination'),
        pageInfo: document.getElementById('pageInfo'),
        search: document.getElementById('search'),
        status: document.getElementById('statusFilter')
    };

    /* =========================
       INIT
    ========================= */
    function init() {
        state.filtered = [...state.data];
        bindEvents();
        render();
    }

    /* =========================
       EVENTS
    ========================= */
    function bindEvents() {
        el.search.addEventListener('input', handleFilter);
        el.status.addEventListener('change', handleFilter);
    }

    /* =========================
       FILTER
    ========================= */
    function handleFilter() {
        const keyword = el.search.value.toLowerCase();
        const status = el.status.value;

        state.filtered = state.data.filter(item => {
            const matchName = item.nama.toLowerCase().includes(keyword);
            const matchStatus = status === 'all' || item.status === status;
            return matchName && matchStatus;
        });

        state.currentPage = 1;
        render();
    }

    /* =========================
       RENDER
    ========================= */
    function render() {
        renderTable();
        renderPagination();
    }

    /* =========================
       TABLE
    ========================= */
    function renderTable() {
        const start = (state.currentPage - 1) * state.rowsPerPage;
        const pageData = state.filtered.slice(start, start + state.rowsPerPage);

        if (pageData.length === 0) {
            el.tableBody.innerHTML = `
            <tr>
                <td colspan="5" class="text-center py-6 text-gray-400">
                    Data tidak ditemukan
                </td>
            </tr>
        `;
            return;
        }

        el.tableBody.innerHTML = pageData.map(rowTemplate).join('');
    }

    function rowTemplate(item) {
        return `
        <tr class="border-b hover:bg-gray-50 transition">
            <td class="py-3">${item.id}</td>
            <td>${item.nama}</td>
            <td>${item.waktu}</td>
            <td>${statusBadge(item.status)}</td>
            <td class="text-right space-x-2">
                <button class="text-blue-500 hover:underline">Edit</button>
                <button class="text-red-500 hover:underline">Hapus</button>
            </td>
        </tr>
    `;
    }

    function statusBadge(status) {
        const base = "px-2 py-1 text-xs rounded-full";

        return status === 'Hadir'
            ? `<span class="${base} bg-green-100 text-green-600">Hadir</span>`
            : `<span class="${base} bg-yellow-100 text-yellow-600">Telat</span>`;
    }

    /* =========================
       PAGINATION
    ========================= */
    function renderPagination() {
        const totalPages = Math.ceil(state.filtered.length / state.rowsPerPage);
        el.pageInfo.innerText = `Page ${state.currentPage} of ${totalPages}`;

        el.pagination.innerHTML = buildPagination(totalPages);
    }

    function buildPagination(totalPages) {
        let buttons = '';

        if (state.currentPage > 1) {
            buttons += pageBtn('Prev', state.currentPage - 1);
        }

        let start = Math.max(1, state.currentPage - 1);
        let end = Math.min(totalPages, start + 3);

        for (let i = start; i <= end; i++) {
            buttons += pageBtn(i, i, i === state.currentPage);
        }

        if (state.currentPage < totalPages) {
            buttons += pageBtn('Next', state.currentPage + 1);
        }

        return buttons;
    }

    function pageBtn(label, page, active = false) {
        return `
        <button onclick="goToPage(${page})"
            class="px-3 py-1 rounded-lg border text-sm ${active
                ? 'bg-purple-600 text-white'
                : 'hover:bg-gray-100 text-gray-600'
            }">
            ${label}
        </button>
    `;
    }

    function goToPage(page) {
        state.currentPage = page;
        render();
    }

    /* =========================
       MODAL
    ========================= */
    function toggleModal(show) {
        const modal = document.getElementById('deviceModal');
        modal.classList.toggle('hidden', !show);
        modal.classList.toggle('flex', show);
    }

    /* =========================
       START
    ========================= */
    init();
</script>
{% endblock %}
