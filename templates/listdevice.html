{% extends "layout/app.html" %}

{% block content %}



<div class="p-6 max-w-7xl mx-auto space-y-6">

    <!-- Header -->
    <div class="flex justify-between items-center">
        <h1 class="text-2xl font-bold">Device Monitoring</h1>
        <button onclick="openModal()" class="px-4 py-2 bg-blue-600 text-white rounded-xl hover:bg-blue-700">
            + Tambah Device
        </button>
    </div>

    <!-- Device Cards -->
   <div class="p-6 space-y-6">

  <!-- Header -->
  <div class="flex justify-between items-center">
    <div>
      <h1 class="text-2xl font-bold">ESP 10A</h1>
      <p class="text-gray-500 text-sm">Lab Komputer</p>
    </div>

    <span class="px-3 py-1 text-sm rounded-full bg-green-100 text-green-600">
      Online
    </span>
  </div>

  <!-- Stats -->
  <div class="grid grid-cols-3 gap-4">
    <div class="bg-white p-4 rounded-xl shadow">
      <p class="text-sm text-gray-500">Ping</p>
      <h2 class="text-xl font-bold">24 ms</h2>
    </div>

    <div class="bg-white p-4 rounded-xl shadow">
      <p class="text-sm text-gray-500">Last Seen</p>
      <h2 class="text-xl font-bold">2s ago</h2>
    </div>

    <div class="bg-white p-4 rounded-xl shadow">
      <p class="text-sm text-gray-500">Uptime</p>
      <h2 class="text-xl font-bold">12h 32m</h2>
    </div>
  </div>

  <!-- Chart -->
  <div class="bg-white p-6 rounded-2xl shadow">
    <h2 class="text-lg font-semibold mb-4">Ping Over Time</h2>
    <canvas id="pingChart"></canvas>
  </div>

</div>

</div>

<!-- Modal -->
<div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg p-6">

        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-bold">Tambah Device</h2>
            <button onclick="closeModal()">✕</button>
        </div>

        <form class="space-y-4">
            <input type="text" placeholder="Serial Number" class="w-full px-3 py-2 border rounded-xl" />
            <input type="text" placeholder="Device Name" class="w-full px-3 py-2 border rounded-xl" />
            <input type="text" placeholder="Location" class="w-full px-3 py-2 border rounded-xl" />
            <input type="text" placeholder="IP Address" class="w-full px-3 py-2 border rounded-xl" />

            <div class="flex justify-end gap-2">
                <button type="button" onclick="closeModal()" class="px-4 py-2 bg-gray-200 rounded-xl">Batal</button>
                <button class="px-4 py-2 bg-blue-600 text-white rounded-xl">Simpan</button>
            </div>
        </form>

    </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    function openModal() {
        document.getElementById('modal').classList.remove('hidden');
        document.getElementById('modal').classList.add('flex');
    }

    function closeModal() {
        document.getElementById('modal').classList.add('hidden');
        document.getElementById('modal').classList.remove('flex');
    }

    
let ctx = document.getElementById('pingChart').getContext('2d');

let pingChart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: 'Ping (ms)',
            data: [],
            tension: 0.4,
            fill: true,
            borderWidth: 2
        }]
    },
    options: {
        responsive: true,
        plugins: {
            legend: { display: false }
        },
        scales: {
            y: {
                beginAtZero: true
            }
        }
    }
});

function loadChart() {
    fetch('/api/device/1/ping') // ganti sesuai id
        .then(res => res.json())
        .then(data => {
            pingChart.data.labels = data.map(d => d.time);
            pingChart.data.datasets[0].data = data.map(d => d.ping);
            pingChart.update();
        });
}

// load awal
loadChart();

// auto refresh tiap 5 detik
setInterval(loadChart, 5000);

</script>
    {% endblock %}
